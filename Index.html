<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question 😜</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .box {
        background: white;
        width: 90%;
        max-width: 350px;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        position: relative;
    }

    h1 {
        font-size: 22px;
    }

    p {
        font-size: 16px;
        margin-bottom: 20px;
    }

    button {
        padding: 12px 22px;
        font-size: 16px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        margin: 10px;
    }

    #yes {
        background: #28a745;
        color: white;
    }

    #no {
        background: #dc3545;
        color: white;
        position: absolute;
    }
</style>
</head>

<body>

<div class="box" id="box">
    <h1>Ek Serious Question 😁</h1>
    <p id="msg">Kya tum meri girlfriend banogi? 💖</p>

    <button id="yes">YES 😍</button>
    <button id="no">NO 🙄</button>
</div>

<script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const msg = document.getElementById("msg");

    const funnyTexts = [
        "Pakad ke dikhao 😜",
        "Galat option try kar rahi ho 😂",
        "YES zyada safe hai 😏",
        "Itna aasan nahi 🤣"
    ];

    function moveNo() {
        msg.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];

        const box = document.getElementById("box");
        const maxX = box.clientWidth - 80;
        const maxY = box.clientHeight - 40;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    // Mobile touch + mouse support
    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("touchstart", moveNo);

    yesBtn.onclick = () => {
        document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#a1ffce,#faffd1);
            font-family:Arial;
            text-align:center;
        ">
            <h1>🎉 She Said YES 🎉</h1>
            <p>Ab Party aap dijiya 😜🍦</p>
            <p>Mission Successful 😂💖</p>
        </div>
        `;
    };
</script>

</body>
</html>
